<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ben Askins</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1C1917;
    --cream: #FAF9F7;
    --rule: #E7E5E4;
    --muted: #A8A29E;
    --mid: #78716C;
  }

  .dark {
    --ink: #FAF9F7;
    --cream: #1C1917;
    --rule: #2E2A27;
    --muted: #A8A29E;
    --mid: #D6D3D1;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.7s ease, color 0.7s ease;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    user-select: none;
  }

  .card {
    width: 400px;
    max-width: calc(100vw - 48px);
    aspect-ratio: 1.75;
    perspective: 1000px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border: 1px solid var(--rule);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 32px;
    transition: border-color 0.7s ease;
  }

  .card-back {
    transform: rotateY(180deg);
  }

  .name {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .role {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.7s ease;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--rule);
    transition: background 0.7s ease;
  }

  .link {
    font-size: 14px;
    font-weight: 400;
    color: var(--mid);
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: color 0.3s ease;
  }

  .link:hover {
    color: var(--ink);
  }

  .label {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.03em;
  }

  .tagline {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.7s ease;
  }

  .sites {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }

  .sites a {
    font-size: 13px;
    font-weight: 400;
    color: var(--mid);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.3s ease;
  }

  .sites a:hover {
    color: var(--ink);
  }

  .hint {
    position: fixed;
    bottom: 24px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    opacity: 1;
    transition: opacity 0.5s ease, color 0.7s ease;
  }

  .hint.hidden {
    opacity: 0;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-inner" id="card">
    <!-- Front: personal -->
    <div class="card-face card-front">
      <span class="name">Benjamin Askins</span>
      <span class="role">Software Engineer</span>
      <div class="divider"></div>
      <a class="link" href="https://benjaminaskins.com" onclick="event.stopPropagation()">benjaminaskins.com</a>
    </div>

    <!-- Back: genlevel -->
    <div class="card-face card-back">
      <span class="label">genlevel</span>
      <span class="tagline">Generative Music &middot; Software</span>
      <div class="divider"></div>
      <div class="sites">
        <a href="https://genlevel.com" onclick="event.stopPropagation()">genlevel.com</a>
        <a href="https://generativeplane.com" onclick="event.stopPropagation()">generativeplane.com</a>
        <a href="https://musicbox.genlevel.com" onclick="event.stopPropagation()">musicbox</a>
      </div>
    </div>
  </div>
</div>

<span class="hint" id="hint">click to flip</span>

<script>
(function() {
  var card = document.getElementById('card');
  var hint = document.getElementById('hint');
  var html = document.documentElement;
  var flipped = false;

  // Flip card on click anywhere
  document.body.addEventListener('click', function() {
    flipped = !flipped;
    card.classList.toggle('flipped', flipped);
    hint.classList.add('hidden');

    // Toggle light/dark on each flip
    html.classList.toggle('dark', flipped);
  });

  // Respect system preference on load
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    html.classList.add('dark');
  }
})();
</script>

</body>
</html>
